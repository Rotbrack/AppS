<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSN Trophy Vergleich</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1117;
            --surface: #161b22;
            --surface-strong: #21262d;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #58a6ff;
            --danger: #ff7b72;
            --success: #3fb950;
            --border: rgba(148, 163, 184, 0.24);
            --card-radius: 24px;
            font-family: Inter, system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(88, 166, 255, 0.16), transparent 26%),
                radial-gradient(circle at bottom, rgba(59, 199, 151, 0.12), transparent 20%),
                var(--bg);
            color: var(--text);
        }

        .page-shell {
            max-width: 1260px;
            margin: 0 auto;
            padding: 24px;
        }

        header.hero {
            padding: 32px 28px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.16);
        }

        header.hero .eyebrow {
            margin: 0 0 12px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.24em;
            font-size: 0.78rem;
        }

        header.hero h1 {
            margin: 0;
            line-height: 1.05;
            font-size: clamp(2.4rem, 3vw, 4rem);
        }

        header.hero p {
            margin: 16px 0 0;
            max-width: 780px;
            line-height: 1.7;
            color: var(--muted);
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 24px;
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
        }

        .compare-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .player-panel {
            display: grid;
            gap: 16px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 1.1rem;
        }

        .field-group {
            display: grid;
            gap: 10px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--muted);
        }

        input,
        button,
        select {
            width: 100%;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 0.95rem;
            padding: 14px 16px;
        }

        input:focus,
        select:focus,
        button:focus {
            outline: 2px solid rgba(88, 166, 255, 0.35);
            outline-offset: 2px;
        }

        button {
            cursor: pointer;
            border: 1px solid transparent;
            background: var(--accent);
            color: #0b1b2b;
            font-weight: 700;
            transition: transform 0.18s ease, background 0.18s ease;
        }

        button:hover {
            transform: translateY(-1px);
            background: #4494f4;
        }

        .switches {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .switches label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .switches input {
            accent-color: var(--accent);
            width: auto;
        }

        .player-summary,
        .search-results,
        .title-list,
        .trophy-list {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(148, 163, 184, 0.12);
            border-radius: 20px;
            padding: 18px;
            min-height: 120px;
        }

        .search-results {
            gap: 12px;
            display: grid;
        }

        .search-item {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 12px;
            align-items: center;
            padding: 12px 14px;
            border-radius: 14px;
            transition: background 0.16s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .search-item:hover {
            background: rgba(88, 166, 255, 0.12);
            border-color: rgba(88, 166, 255, 0.24);
        }

        .search-item img,
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: #0b1120;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .person-card {
            display: grid;
            gap: 10px;
        }

        .person-card h3 {
            margin: 0;
            font-size: 1rem;
        }

        .person-card small {
            color: var(--muted);
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .badge {
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(88, 166, 255, 0.12);
            color: #c9d1d9;
            font-size: 0.9rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .metric-card {
            padding: 18px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .metric-card strong {
            display: block;
            font-size: 2rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .metric-card span {
            color: var(--muted);
        }

        .details-columns {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 20px;
        }

        .title-list ul,
        .trophy-list ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 12px;
        }

        .title-item,
        .trophy-item {
            display: grid;
            grid-template-columns: 60px 1fr auto;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease;
            align-items: center;
        }

        .title-item:hover,
        .trophy-item:hover {
            transform: translateY(-1px);
            border-color: rgba(88, 166, 255, 0.2);
        }

        .title-item img {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            object-fit: cover;
            background: #0b1120;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .title-item strong,
        .trophy-item strong {
            margin: 0;
            font-size: 0.96rem;
        }

        .detail-footer {
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .note {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }

        @media (max-width: 980px) {
            .compare-grid,
            .details-columns,
            .summary-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="card" style="background-color: #3fb950;">
            <p id="insertsadasdasd"></p>
        </header>
        <header class="hero">
            <p class="eyebrow">Usermanagement</p>
            <h1>Verwalten von Benutzern</h1>
            <p>Verwalte Benutzerkonten, Rollen und Berechtigungen.</p>
        </header>

        <section class="card">
            <div class="compare-grid">
                <div class="player-panel" id="panelA">
                    <div class="panel-header">
                        <div>
                            <h2>User suchen MS</h2>
                            <small>User suchen</small>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="UserInput">MS User auswählen</label>
                        <input 
                            id="UserInput" 
                            type="text" 
                            placeholder="Gib den Nutzernamen ein..." 
                        />
                        <button id="loadButtonA" type="button">Laden</button>
                    </div>
                    <div class="field-group">
                        <label for="PermsInput">Berechtigungen</label>
                        <input 
                            id="PermsInput" 
                            type="text" 
                            placeholder="Gib die Berechtigungen ein..." 
                        />
                        <button id="loadButtonB" type="button">Berechtigung erteilen</button>
                        <button id="loadButtonC" type="button">Berechtigung widerrufen</button>
                    </div>
                    <div class="player-summary" id="summaryA">
                        <button id="loadButtonD" type="button">Hochladen</button>
                    </div>
                   <div >
                     <h2>Alle MS User mit Berechtigungen</h2>
                        <div class="search-results" id="searchResultsA">
                            <!-- Dynamische Suchergebnisse werden hier eingefügt -->
                        </div>
                   </div>
                </div>
                <script>

                    document.addEventListener("DOMContentLoaded", () => {
        const input = document.getElementById("UserInput");

        const button = document.getElementById("loadButtonA");
        const statusDiv = document.getElementById("summaryA");
        const setStatus = (message) => {
            statusDiv.innerHTML = message;

            const searchResults = document.getElementById("searchResultsA");
            searchResults.innerHTML = "";
            if (message.includes("Fehler")) {
                searchResults.innerHTML = `<div class="search-item"><span style="color:#f87171">Es ist ein Fehler aufgetreten. Bitte versuche es erneut.</span></div>`;
            } else if (message.includes("erfolgreich")) {
                searchResults.innerHTML = `<div class="search-item"><span style="color:#3fb950">Benutzerinformationen wurden erfolgreich geladen.</span></div>`;
            }
        };

        const uploadValue = async (value, perm) => {
            const response = await fetch(`/api/ms/user/${value}/roles`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({ permissions: perm }),
            });
            const data = await response.json();
            setStatus(data.message);
        };

        button.addEventListener("click", async () => {
            const value = input.value;
            if (value) {
                await uploadValue(value);
            }
        });
    });
</script>
</div>
</section>
</div>

</body>
</html>
